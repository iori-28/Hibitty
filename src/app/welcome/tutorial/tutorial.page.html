<ion-header>
  <ion-toolbar>
    <ion-title>Tutorial Singkat</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card class="tutorial-card">
    <ion-card-header>
      <ion-card-title>{{ steps[currentStep].title }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <p>{{ steps[currentStep].description }}</p>
      <p class="step-indicator">Langkah {{ currentStep + 1 }} dari {{ steps.length }}</p>

      <div class="actions">
        <ion-button fill="outline" color="medium" (click)="prevStep()" [disabled]="currentStep === 0">Sebelumnya</ion-button>
        <ion-button class="warm-btn" (click)="nextStep()" *ngIf="currentStep < steps.length - 1">Lanjut</ion-button>
        <ion-button class="warm-btn" (click)="finishTutorial()" *ngIf="currentStep === steps.length - 1">Iya,
          paham</ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
